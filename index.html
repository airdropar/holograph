<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netlify Project Manager</title>
  <meta name="description" content="Mobile-optimized dashboard for managing Netlify projects, deploys, and agent runs." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b14;
      --panel: #12182b;
      --panel-alt: #1a2240;
      --text: #eef2ff;
      --muted: #a9b5dc;
      --accent: #5b8cff;
      --danger: #ff5c7c;
      --success: #3ddc97;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #1a2455, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
    }
    .app { width: min(980px, 100%); margin: 0 auto; display: grid; gap: 1rem; }
    .card {
      background: linear-gradient(145deg, var(--panel), var(--panel-alt));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.33);
    }
    h1 { margin: 0 0 .35rem; font-size: clamp(1.4rem, 6vw, 2.2rem); }
    p { margin: .4rem 0; color: var(--muted); line-height: 1.5; }
    .stack { display: grid; gap: .75rem; }
    .row { display: flex; gap: .55rem; flex-wrap: wrap; }
    input, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text);
      padding: .72rem .8rem;
      min-height: 44px;
    }
    input { width: 100%; }
    button {
      cursor: pointer;
      background: var(--accent);
      border: none;
      font-weight: 600;
      transition: transform .15s ease;
    }
    button:active { transform: scale(0.985); }
    button.secondary { background: rgba(255, 255, 255, .14); }
    button.danger { background: var(--danger); }
    #status { margin-top: .25rem; padding: .7rem; border-radius: 10px; font-size: .95rem; display: none; }
    #status.success { display: block; background: rgba(61,220,151,.14); color: #9df7ca; }
    #status.error { display: block; background: rgba(255,92,124,.16); color: #ffadbf; }
    #projects, #deployItems, #agentItems { display: grid; gap: .8rem; }
    .project, .item {
      border-radius: 12px;
      padding: .9rem;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(0,0,0,.22);
      display: grid;
      gap: .5rem;
    }
    .project h3, .item h4 { margin: 0; font-size: 1.02rem; word-break: break-word; }
    .meta { color: var(--muted); font-size: .88rem; }
    .actions { display: grid; gap: .45rem; grid-template-columns: 1fr 1fr; }
    .pill {
      display: inline-flex;
      font-size: .72rem;
      padding: .2rem .45rem;
      border-radius: 999px;
      background: rgba(91, 140, 255, .2);
      color: #b9ccff;
      margin-right: .35rem;
      margin-bottom: .35rem;
    }
    .tabs { display: flex; gap: .45rem; margin-top: .4rem; }
    .tabs button.active { outline: 2px solid rgba(255,255,255,.3); }
    .hidden { display: none !important; }
    @media (min-width: 760px) {
      body { padding: 1.5rem; }
      .layout { display: grid; grid-template-columns: 1fr 1.3fr; gap: 1rem; }
      .actions { grid-template-columns: repeat(4, max-content); justify-content: start; }
      .actions button { min-width: 95px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Netlify Project Manager</h1>
      <p>Manage projects, open recent deploys, and review agent/build runs from a mobile-friendly dashboard.</p>
      <p><strong>Tip:</strong> Your token is stored only in this browser (`localStorage`) and is only used for Netlify API calls.</p>
    </section>

    <section class="layout">
      <article class="card stack">
        <label for="token">Personal Access Token</label>
        <input id="token" type="password" placeholder="Paste your Netlify token" autocomplete="off" />
        <div class="row">
          <button id="saveToken">Save token</button>
          <button id="loadSites" class="secondary">Load projects</button>
          <button id="clearToken" class="danger">Clear token</button>
        </div>
        <label for="search">Search projects</label>
        <input id="search" type="search" placeholder="Search by site name or URL" />
        <div id="status" role="status" aria-live="polite"></div>
      </article>

      <article class="card">
        <div class="row" style="justify-content:space-between;align-items:center;">
          <h2 style="margin:0;font-size:1.15rem;">Projects</h2>
          <small id="count" class="meta">0 loaded</small>
        </div>
        <div id="projects" style="margin-top:.8rem;"></div>
      </article>
    </section>

    <section id="details" class="card hidden">
      <div class="row" style="justify-content:space-between;align-items:center;">
        <h2 id="detailTitle" style="margin:0;font-size:1.1rem;">Project details</h2>
        <small id="detailMeta" class="meta"></small>
      </div>
      <div class="tabs">
        <button id="showDeploys" class="active">Deploys</button>
        <button id="showAgents" class="secondary">Agent runs</button>
      </div>
      <div id="deployPanel">
        <div id="deployItems" style="margin-top:.8rem;"></div>
      </div>
      <div id="agentPanel" class="hidden">
        <div id="agentItems" style="margin-top:.8rem;"></div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = 'https://api.netlify.com/api/v1';
    const tokenInput = document.getElementById('token');
    const searchInput = document.getElementById('search');
    const projectsContainer = document.getElementById('projects');
    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');
    const detailsEl = document.getElementById('details');
    const detailTitleEl = document.getElementById('detailTitle');
    const detailMetaEl = document.getElementById('detailMeta');
    const deployItemsEl = document.getElementById('deployItems');
    const agentItemsEl = document.getElementById('agentItems');
    const deployPanelEl = document.getElementById('deployPanel');
    const agentPanelEl = document.getElementById('agentPanel');
    const showDeploysBtn = document.getElementById('showDeploys');
    const showAgentsBtn = document.getElementById('showAgents');

    let allProjects = [];
    let selectedSiteId = '';

    function setStatus(message, kind = 'success') {
      statusEl.className = kind;
      statusEl.textContent = message;
    }

    function getToken() {
      return tokenInput.value.trim() || localStorage.getItem('netlify_token') || '';
    }

    async function api(path, options = {}) {
      const token = getToken();
      if (!token) throw new Error('Add a Netlify Personal Access Token first.');

      const response = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });

      if (!response.ok) {
        const details = await response.text();
        throw new Error(`${response.status} ${response.statusText}: ${details || 'Request failed'}`);
      }
      if (response.status === 204) return null;
      return response.json();
    }

    function relativeTime(value) {
      if (!value) return 'unknown';
      const date = new Date(value);
      const diff = Date.now() - date.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function switchTab(tab) {
      const deploys = tab === 'deploys';
      deployPanelEl.classList.toggle('hidden', !deploys);
      agentPanelEl.classList.toggle('hidden', deploys);
      showDeploysBtn.className = deploys ? 'active' : 'secondary';
      showAgentsBtn.className = deploys ? 'secondary' : 'active';
    }

    function renderProjects(projects = allProjects) {
      countEl.textContent = `${projects.length} loaded`;
      if (!projects.length) {
        projectsContainer.innerHTML = '<p class="meta">No projects found for this filter.</p>';
        return;
      }

      projectsContainer.innerHTML = projects.map((site) => `
        <article class="project" data-id="${site.id}">
          <div>
            <h3>${site.name}</h3>
            <div class="meta">${site.ssl_url || site.url || 'No URL'}</div>
          </div>
          <div>
            <span class="pill">Updated: ${relativeTime(site.updated_at)}</span>
            <span class="pill">Repo: ${site.repo?.repo_path || 'n/a'}</span>
          </div>
          <div class="actions">
            <button data-action="manage">Manage</button>
            <button data-action="open" class="secondary">Open</button>
            <button data-action="deploy" class="secondary">Deploy</button>
            <button data-action="delete" class="danger">Delete</button>
          </div>
        </article>
      `).join('');
    }

    function renderDeploys(items) {
      if (!items.length) {
        deployItemsEl.innerHTML = '<p class="meta">No deploys returned.</p>';
        return;
      }
      deployItemsEl.innerHTML = items.map((d) => `
        <article class="item">
          <h4>${d.title || d.name || d.id}</h4>
          <div class="meta">State: ${d.state || 'unknown'} · Published: ${relativeTime(d.published_at || d.created_at)}</div>
          <div class="meta">${d.ssl_url || d.deploy_ssl_url || d.url || ''}</div>
        </article>
      `).join('');
    }

    function renderAgentRuns(items) {
      if (!items.length) {
        agentItemsEl.innerHTML = '<p class="meta">No agent/build runs returned.</p>';
        return;
      }
      agentItemsEl.innerHTML = items.map((run) => `
        <article class="item">
          <h4>${run.title || run.deploy_id || run.id}</h4>
          <div class="meta">State: ${run.state || 'unknown'} · Started: ${relativeTime(run.created_at)}</div>
          <div class="meta">Commit: ${run.commit_ref || run.sha || 'n/a'}</div>
        </article>
      `).join('');
    }

    async function loadProjects() {
      try {
        setStatus('Loading projects...');
        allProjects = await api('/sites');
        renderProjects(allProjects);
        setStatus(`Loaded ${allProjects.length} projects.`);
      } catch (error) {
        setStatus(error.message, 'error');
      }
    }

    async function loadProjectDetails(site) {
      selectedSiteId = site.id;
      detailsEl.classList.remove('hidden');
      detailTitleEl.textContent = `${site.name} details`;
      detailMetaEl.textContent = site.ssl_url || site.url || '';

      deployItemsEl.innerHTML = '<p class="meta">Loading deploys...</p>';
      agentItemsEl.innerHTML = '<p class="meta">Loading agent runs...</p>';

      try {
        const [deploys, runs] = await Promise.all([
          api(`/sites/${site.id}/deploys?per_page=10`),
          api(`/sites/${site.id}/builds?per_page=10`)
        ]);
        if (selectedSiteId !== site.id) return;
        renderDeploys(deploys || []);
        renderAgentRuns(runs || []);
        setStatus(`Loaded deploys and agent runs for ${site.name}.`);
      } catch (error) {
        setStatus(`Failed loading project details: ${error.message}`, 'error');
      }
    }

    async function triggerDeploy(siteId) {
      try {
        setStatus('Triggering deploy...');
        await api(`/sites/${siteId}/builds`, { method: 'POST', body: JSON.stringify({ clear_cache: false }) });
        setStatus('Deploy started successfully.');
      } catch (error) {
        setStatus(`Deploy failed: ${error.message}`, 'error');
      }
    }

    async function deleteSite(siteId) {
      if (!window.confirm('Delete this site from Netlify? This cannot be undone.')) return;
      try {
        setStatus('Deleting project...');
        await api(`/sites/${siteId}`, { method: 'DELETE' });
        allProjects = allProjects.filter((p) => p.id !== siteId);
        renderProjects();
        if (selectedSiteId === siteId) detailsEl.classList.add('hidden');
        setStatus('Project deleted.');
      } catch (error) {
        setStatus(`Delete failed: ${error.message}`, 'error');
      }
    }

    document.getElementById('saveToken').addEventListener('click', () => {
      const token = tokenInput.value.trim();
      if (!token) return setStatus('Token cannot be empty.', 'error');
      localStorage.setItem('netlify_token', token);
      setStatus('Token saved locally on this device.');
    });

    document.getElementById('clearToken').addEventListener('click', () => {
      localStorage.removeItem('netlify_token');
      tokenInput.value = '';
      setStatus('Saved token removed.');
    });

    document.getElementById('loadSites').addEventListener('click', loadProjects);

    showDeploysBtn.addEventListener('click', () => switchTab('deploys'));
    showAgentsBtn.addEventListener('click', () => switchTab('agents'));

    projectsContainer.addEventListener('click', (event) => {
      const button = event.target.closest('button');
      if (!button) return;
      const project = event.target.closest('.project');
      if (!project) return;
      const site = allProjects.find((entry) => entry.id === project.dataset.id);
      if (!site) return;

      if (button.dataset.action === 'manage') loadProjectDetails(site);
      if (button.dataset.action === 'open') window.open(site.ssl_url || site.url, '_blank', 'noopener');
      if (button.dataset.action === 'deploy') triggerDeploy(site.id);
      if (button.dataset.action === 'delete') deleteSite(site.id);
    });

    searchInput.addEventListener('input', () => {
      const term = searchInput.value.trim().toLowerCase();
      const filtered = allProjects.filter((site) =>
        site.name.toLowerCase().includes(term) ||
        (site.ssl_url || site.url || '').toLowerCase().includes(term)
      );
      renderProjects(filtered);
    });

    const saved = localStorage.getItem('netlify_token');
    if (saved) tokenInput.value = saved;
  </script>
</body>
</html>
